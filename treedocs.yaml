        _doc: CLI commands for reading filesystem metadata.
        FileMetadataCommands.swift: Parent command for file metadata subcommands.
        ReadMetadata.swift: Command that reads and prints metadata for a file path.
      FrontMatterCommands:
        _doc: CLI commands for YAML frontmatter CRUD, search, sorting, and array operations.
        ArrayAppend.swift: Command that appends values to frontmatter arrays.
        ArrayCommands.swift: Parent command for frontmatter array subcommands.
        ArrayContains.swift: Command that checks whether a frontmatter array contains
          a value.
        ArrayHelpers.swift: Shared helpers for frontmatter array command implementations.
        ArrayPrepend.swift: Command that prepends values to frontmatter arrays.
        ArrayRemove.swift: Command that removes values from frontmatter arrays.
        Dump.swift: Command that dumps complete frontmatter in supported formats.
        FrontMatterCommands.swift: Parent command for frontmatter subcommands.
        Get.swift: Command that reads a frontmatter value by key.
        Has.swift: Command that checks whether a frontmatter key exists.
        List.swift: Command that lists frontmatter keys and values.
        Remove.swift: Command that removes a frontmatter key.
        Rename.swift: Command that renames a frontmatter key.
        Replace.swift: Command that replaces frontmatter content from supplied data.
        Search.swift: Command that searches frontmatter with JMESPath expressions.
        Set.swift: Command that sets a frontmatter key value.
        SortKeys.swift: Command that sorts frontmatter keys.
        Touch.swift: Command that creates frontmatter if missing or updates document
          metadata.
      GlobalOptions.swift: Shared command-line options used across md-utils commands.
      HeadingCommands:
        _doc: CLI commands for promoting and demoting Markdown heading levels.
        DemoteHeading.swift: Command that increases heading levels within a selected
          scope.
        HeadingCommands.swift: Parent command for heading adjustment subcommands.
        PromoteHeading.swift: Command that decreases heading levels within a selected
          scope.
      LinkCommands:
        _doc: CLI commands for listing, checking, and resolving Markdown wikilinks.
        Backlinks.swift: Command that reports files linking to a target document.
        Check.swift: Command that validates wikilink targets and anchors.
        LinkCommands.swift: Parent command for wikilink-related subcommands.
        ListLinks.swift: Command that lists wikilinks found in Markdown files.
      OKFCommands:
        _doc: CLI commands for Open Knowledge Format initialization, validation, and
