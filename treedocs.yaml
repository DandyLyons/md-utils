        RulesFilesMatching.swift: Command that lists files matched by configured rules.
        RulesInit.swift: Command that bootstraps rules configuration and an initial
          frontmatter schema check.
        RulesList.swift: Command that lists configured rules and checks.
        RulesMatching.swift: Command that reports which configured rules match a file.
        RulesRemove.swift: Command that removes configured rules and optionally deletes
          unshared schema files.
        RulesSupport.swift: Shared configuration, matching, validation, and rule check
          support for rules commands.
        RulesValidate.swift: Command and formatter for validating Markdown files against
          configured rules.
      SectionCommands:
        _doc: CLI commands for listing, retrieving, replacing, and moving Markdown
