tree:
  .dockerignore: Docker build-context exclusions for local build artifacts and repository
    metadata.
  .github:
    _doc: GitHub repository automation, including Pages deployment and schema publication
      validation workflows.
    workflows:
      _doc: GitHub Actions workflow definitions for repository automation.
      pages.yml: Deploys the static documentation and public JSON Schema files to
        GitHub Pages.
      schema-publication.yml: Validates bundled and public JSON Schema publication
        files stay synchronized.
  .gitignore: Git ignore rules for generated files, local settings, and build artifacts.
  .md-utils:
    _doc: Project-local md-utils configuration and reusable validation resources.
    types:
      _doc: Project Markdown type definitions using the mdtype compound extensions.
  AGENTS.md: Agent-facing project instructions, architecture notes, and workflow rules.
  Dockerfile.core-linux: Swift 6.2 Linux build and smoke-test definition for MarkdownUtilitiesCore.
  IntegrationTests:
    _doc: Standalone packages that validate md-utils products as external consumers.
    LinuxCoreSmoke:
      _doc: Linux integration package that imports and exercises MarkdownUtilitiesCore.
      Package.swift: Swift package manifest for the Linux Core smoke test.
      Sources:
        _doc: Source code for integration-test executables.
        LinuxCoreSmoke:
          _doc: Executable target for validating portable Core APIs on Linux.
          main.swift: Smoke test for Core frontmatter parsing, Markdown AST access,
            and rendering.
  Package.resolved: SwiftPM dependency lockfile generated from package resolution.
  Package.swift: Swift package manifest defining library, CLI, dependencies, resources,
    and tests.
  README.md: Project overview with installation, feature list, usage examples, and
    status notes.
  Sources:
    _doc: Swift package source code for the MarkdownUtilities library and md-utils
      CLI.
    MarkdownUtilities:
      _doc: Reusable Swift library for parsing, inspecting, converting, and mutating
        Markdown documents.
      Documentation.docc:
        _doc: DocC documentation catalog for the MarkdownUtilities library API and
          workflows.
        CSVConversion.md: DocC article for CSV conversion through the native MarkdownUtilities
          layer.
        MarkdownUtilities.md: DocC landing page for the MarkdownUtilities library.
      FileMetadata:
        _doc: Library types for reading filesystem metadata and extended attributes.
        ExtendedAttributes.swift: Helpers for loading platform extended attributes
          from files.
        FileMetadata.swift: Structured representation of file size, dates, permissions,
          and attributes.
        FileMetadataError.swift: Error cases raised while reading file metadata.
        FileMetadataReader.swift: Service that gathers metadata for filesystem paths.
      FormatConversion:
        _doc: Markdown conversion support for plain text, CSV, and shared extraction
          logic.
        CSV:
          _doc: CSV conversion implementation and options.
          CSVConverter.swift: Converts Markdown document content into CSV rows.
          CSVOptions.swift: Configuration for Markdown to CSV conversion.
      Types:
        _doc: Native filesystem adapters for loading type registries and reading or
          writing Markdown records.
        MarkdownTypeFileRegistryLoader.swift: Loads mdtype definitions and schema
          resources, confines references to the project, and adapts filesystem records.
      Wikilink:
        _doc: Obsidian-style wikilink parsing, scanning, and resolution support.
        ResolvedWikilink.swift: Model describing a wikilink matched to a filesystem
          target.
        WikilinkResolver.swift: Resolves wikilinks against Markdown files and anchors.
    MarkdownUtilitiesCore:
      _doc: Portable Swift library for parsing, inspecting, converting, and mutating
        Markdown documents.
      Documentation.docc:
        _doc: DocC documentation catalog for the portable MarkdownUtilitiesCore API
          and workflows.
        FormatConversionWorkflows.md: DocC article for converting Markdown documents
          to plain text.
        FrontmatterWorkflows.md: DocC article for reading and modifying YAML frontmatter.
        MarkdownRules.md: DocC article explaining portable rule applicability, checks,
          and shared type predicates.
        MarkdownTypes.md: DocC article explaining Markdown records, structural type
          conformance, type hints, diagnostics, and fix-its.
        MarkdownUtilitiesCore.md: DocC landing page for the MarkdownUtilitiesCore
          library.
        Resources:
          _doc: Resource directory for MarkdownUtilitiesCore DocC assets.
        SectionWorkflows.md: DocC article for extracting, inserting, replacing, and
          reordering Markdown sections.
        WorkingWithMarkdownDocuments.md: DocC article introducing MarkdownDocument
          parsing and manipulation.
      Explore:
        _doc: Portable support for summarizing Markdown documents for exploration
          output.
        ExploreDocument.swift: Model that captures document headings, metadata, and
          preview information.
      FormatConversion:
        _doc: Portable Markdown conversion protocols, plain-text conversion, and shared
          extraction logic.
        MarkdownDocument+FormatConversion.swift: Convenience APIs for converting MarkdownDocument
          values.
        PlainText:
          _doc: Plain-text conversion implementation and options.
          PlainTextConverter.swift: Converts Markdown document content into readable
            plain text.
          PlainTextOptions.swift: Configuration for Markdown-to-plain-text conversion.
        Protocols:
          _doc: Shared protocols for conversion options and converter implementations.
          ConversionOptions.swift: Marker protocol for format-specific conversion
            configuration.
          FormatConverter.swift: Protocol for types that convert Markdown documents
            into another representation.
        Shared:
          _doc: Shared Markdown AST text-extraction utilities used by converters.
          BlockContentTextExtractor.swift: Extracts textual content from block-level
            Markdown nodes.
          PhrasingContentTextExtractor.swift: Extracts textual content from inline
            Markdown phrasing nodes.
      Formatting:
        _doc: Markdown formatting normalization utilities.
        BulletNormalizer.swift: Normalizes unordered-list bullet markers.
        ItalicNormalizer.swift: Normalizes italic-emphasis delimiters.
        MarkdownDocument+Formatting.swift: Convenience APIs for applying formatting
          normalizers to documents.
        TableNormalizer.swift: Normalizes Markdown table spacing and alignment.
      FrontMatter:
        _doc: YAML frontmatter parsing, serialization, querying, and mutation support.
        FrontMatterParser.swift: Parser that separates YAML frontmatter from Markdown
          body content.
        MarkdownDocument+FrontMatter.swift: Read APIs for accessing MarkdownDocument
          frontmatter values.
        MarkdownDocument+FrontMatterMutation.swift: Mutation APIs for setting, removing,
          and renaming frontmatter keys.
        YAMLConversion.swift: Conversion helpers between Yams nodes and Swift values.
      HeadingAdjustment:
        _doc: Heading promotion and demotion logic that preserves Markdown section
          structure.
        HeadingAdjuster.swift: Applies heading-level changes within selected scopes.
        HeadingAdjusterError.swift: Error cases for invalid heading-adjustment operations.
        HeadingReconstructor.swift: Rebuilds Markdown text after heading levels change.
        HeadingScope.swift: Defines the range of headings affected by an adjustment.
        MarkdownDocument+HeadingAdjustment.swift: Convenience APIs for promoting and
          demoting document headings.
      Helpers:
        _doc: Small shared helper utilities for MarkdownUtilitiesCore.
        LineNumbers.swift: Helpers for mapping Markdown content to line numbers and
          ranges.
      MarkdownDocument.swift: Core Markdown document model with parsed frontmatter
        and body content.
      Rules:
        _doc: Portable Markdown rule models and check evaluation shared by library
          and CLI clients.
        MarkdownRuleCheckEvaluator.swift: Evaluates portable frontmatter-schema, heading,
          line, and word-count rule checks.
        MarkdownRuleDefinition.swift: Defines rule applicability, requirements, recommendations,
          and type-conformance predicates.
      SectionExtraction:
        _doc: Logic for finding, extracting, inserting, and replacing heading-delimited
          Markdown sections.
        MarkdownDocument+SectionExtraction.swift: Convenience APIs for retrieving
          sections from a MarkdownDocument.
        MarkdownDocument+SectionInsertion.swift: Convenience APIs for inserting sections
          into a MarkdownDocument.
        MarkdownDocument+SectionReplacement.swift: Convenience APIs for replacing
          sections in a MarkdownDocument.
        SectionBoundaryDetector.swift: Detects section start and end boundaries from
          Markdown headings.
        SectionContent.swift: Value type representing extracted section text and metadata.
        SectionExtractor.swift: Extracts section content by heading name or index.
        SectionExtractorError.swift: Error cases for missing or ambiguous section-extraction
          requests.
        SectionInsertionError.swift: Error cases for invalid section-insertion requests.
      SectionReordering:
        _doc: Logic for moving Markdown sections among sibling headings.
        MarkdownDocument+SectionReordering.swift: Convenience APIs for reordering
          sections in a MarkdownDocument.
        SectionReorderer.swift: Moves sections up, down, or to a target position.
        SectionReordererError.swift: Error cases for invalid section-reordering operations.
        SectionSiblingFinder.swift: Finds sibling sections at the same heading level.
      TOC:
        _doc: Table-of-contents generation, representation, and rendering.
        HeadingTextExtractor.swift: Extracts plain heading text from Markdown heading
          nodes.
        MarkdownDocument+TOC.swift: Convenience APIs for generating a document table
          of contents.
        TOCEntry.swift: Model for a single table-of-contents entry.
        TOCGenerator.swift: Builds table-of-contents entries from Markdown headings.
        TOCRenderer.swift: Renders table-of-contents data into supported output formats.
        TableOfContents.swift: Container type for generated table-of-contents entries.
      Types:
        _doc: Portable models and services for defining, compiling, assessing, and
          repairing typed Markdown records.
        JSONValue.swift: Sendable JSON value representation used by schemas, frontmatter,
          and diagnostics.
        MarkdownDiagnostic.swift: Structured conformance diagnostics, severity, locations,
          and fix-it models.
        MarkdownRecord.swift: Canonical Markdown record identity, revision, context,
          logical path, and type-hint models.
        MarkdownRecordAnalyzer.swift: Parses canonical record content once into reusable
          frontmatter, body, AST, and outline analysis.
        MarkdownTypeChecker.swift: Assesses records against named types, predicates,
          recommendations, and declared type hints.
        MarkdownTypeDefinition.swift: Defines named versioned type contracts across
          frontmatter, body, and context domains.
        MarkdownTypeDefinitionDecoder.swift: Decodes and validates YAML or JSON Markdown
          type-definition envelopes and constraints.
        MarkdownTypeFixer.swift: Applies selected structured conformance edits to
          in-memory Markdown records.
        MarkdownTypeRegistry.swift: Validates type definitions and compiles cached
          inline and referenced JSON Schema graphs.
      Wikilink:
        _doc: Portable Obsidian-style wikilink parsing and scanning support.
        MarkdownDocument+Wikilink.swift: Convenience APIs for scanning wikilinks in
          MarkdownDocument content.
        Wikilink.swift: Model for a parsed wikilink target, anchor, and display text.
        WikilinkAnchor.swift: Model for heading or block anchors inside wikilinks.
        WikilinkParser.swift: Parser for Obsidian-style double-bracket wikilink syntax.
        WikilinkScanner.swift: Scans Markdown text for wikilink occurrences.
    md-utils:
      _doc: Command-line executable target built on the MarkdownUtilities library.
      AgentCommands:
        _doc: CLI commands for installing and inspecting bundled agent integration
          files.
        AgentCommands.swift: Parent command for agent-related md-utils subcommands.
        AgentInstall.swift: Command for installing the bundled markdown-utilities
          agent skill.
        AgentSkill.swift: Command for printing or exporting the bundled agent skill
          content.
        PrintConfigSchema.swift: Command for printing configuration schema data for
          agents.
      CLIEntry.swift: AsyncParsableCommand entry point and subcommand registration
        for md-utils.
      CLIStyle.swift: Shared terminal styling helpers for CLI output.
      CommandTimer.swift: Utility for measuring and reporting command execution timing.
      Commands:
        _doc: Top-level content selection, formatting, and table of contents commands.
        Body.swift: Command that outputs Markdown body content without frontmatter.
        ExtractSection.swift: Command that extracts a Markdown section by heading
          or index.
        FormatCommand.swift: Command that normalizes Markdown formatting.
        GenerateTOC.swift: Command that generates a table of contents from headings.
        Lines.swift: Command that extracts selected line ranges from files.
      ConfigCommands:
        _doc: CLI commands and helpers for md-utils configuration schema output.
        ConfigCommands.swift: Parent command for configuration-related subcommands.
        ConfigInfo.swift: Command that reports md-utils CLI and configuration schema
          information.
        ConfigMigrate.swift: Command that migrates older md-utils configuration files
          to the current schema.
        ConfigSchema.swift: Embedded schema model for md-utils configuration files.
        ConfigSchemaPrinter.swift: Formatter for printing configuration schema information.
      ConvertCommands:
        _doc: CLI commands for converting Markdown to other output formats.
        ConvertCommands.swift: Parent command for conversion subcommands.
        ToCSV.swift: Command that converts Markdown content to CSV output.
        ToText.swift: Command that converts Markdown content to plain text output.
      Documentation.docc:
        _doc: DocC documentation catalog for md-utils command-line workflows.
        ContentSelectionCommands.md: DocC article for body, lines, and section extraction
          commands.
        ConversionCommands.md: DocC article for Markdown conversion commands.
        FrontmatterCommands.md: DocC article for frontmatter command workflows.
        OKFCommands.md: DocC article for Open Knowledge Format support commands.
        Resources:
          _doc: Resource directory for md-utils DocC assets.
        RulesValidationCommands.md: DocC article for rules initialization, matching,
          and validation commands.
        TypesCommands.md: DocC article for creating, inspecting, assessing, finding,
          verifying, and fixing typed Markdown records.
        WikilinkCommands.md: DocC article for wikilink listing, checking, and backlink
          commands.
        md-utils.md: DocC landing page for the md-utils CLI.
      ExploreCommands:
        _doc: CLI explore command implementation for summarizing Markdown files and
