        0.2.0_md-utils.schema.json: Bundled JSON Schema for md-utils rules config
          version 0.2.0.
        1_md-utils-type.schema.json: Bundled JSON Schema for Markdown type-definition
          format version 1.
        OKF-concept.schema.json: Bundled JSON Schema for OKF concept metadata validation.
        SKILL.md: Embedded copy of the markdown-utilities agent skill instructions.
      RulesCommands:
        _doc: CLI rules command group implementation for project-level Markdown validation.
        RulesAdd.swift: Command that adds frontmatter schema-backed rules to configuration.
        RulesCommands.swift: Parent command for rules-related subcommands.
        RulesDescribe.swift: Command and renderers for describing configured rules
