        GetSection.swift: Command that prints a selected Markdown section.
        InsertSection.swift: Command that inserts a Markdown section relative to an
          existing section.
        ListSections.swift: Command that lists sections found in a Markdown document.
        MoveSectionDown.swift: Command that moves a section after its next sibling.
        MoveSectionTo.swift: Command that moves a section to a specific sibling position.
        MoveSectionUp.swift: Command that moves a section before its previous sibling.
        RemoveSection.swift: Command that removes a selected Markdown section.
        SectionCommands.swift: Parent command for section manipulation subcommands.
        SetSection.swift: Command that replaces the content of a selected Markdown
          section.
      TypesCommands:
        _doc: CLI commands and support for managing type definitions and assessing
