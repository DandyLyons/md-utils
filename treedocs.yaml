        OKFCommands.swift: Parent command for OKF-related subcommands.
        OKFDoctor.swift: Command that diagnoses OKF setup and content issues.
        OKFInit.swift: Command that initializes OKF frontmatter fields.
        OKFReport.swift: Command that reports OKF metadata across files.
        OKFSupport.swift: Shared helpers for OKF command implementations.
        OKFTypeCommands.swift: Commands for reading or setting OKF type values.
        OKFValidate.swift: Command that validates OKF frontmatter against bundled
          rules.
      OutputFormat.swift: Shared output format enumeration for command result rendering.
      Resources:
        _doc: Runtime resources embedded in the md-utils executable target.
        0.1.0_md-utils.schema.json: Bundled md-utils config JSON Schema for configVersion
