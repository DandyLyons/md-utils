name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - site/**
      - Sources/md-utils/Resources/*_md-utils.schema.json
      - scripts/validate-schema-publication.py
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  CURRENT_MD_UTILS_JSONSCHEMA_VERSION: 0.2.0

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Validate schema publication files
        run: python3 scripts/validate-schema-publication.py

      - name: Prepare Pages artifact
        run: |
          mkdir -p "$RUNNER_TEMP/md-utils-pages"
          cp -R site/. "$RUNNER_TEMP/md-utils-pages/"
          mkdir -p "$RUNNER_TEMP/md-utils-pages/schemas/latest"
          cp "site/schemas/$CURRENT_MD_UTILS_JSONSCHEMA_VERSION/md-utils.schema.json" "$RUNNER_TEMP/md-utils-pages/md-utils.schema.json"
          cp "site/schemas/$CURRENT_MD_UTILS_JSONSCHEMA_VERSION/md-utils.schema.json" "$RUNNER_TEMP/md-utils-pages/schemas/latest/md-utils.schema.json"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/md-utils-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Retry deploy to GitHub Pages
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
