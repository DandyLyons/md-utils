name: WebAssembly Core

on:
  pull_request:
    paths:
      - Package.swift
      - Package.resolved
      - Sources/MarkdownUtilitiesCore/**
      - IntegrationTests/WasmCoreSmoke/**
      - scripts/build-wasm.sh
      - scripts/wasm-patches/**
      - .github/workflows/webassembly.yml
  push:
    branches:
      - main
    paths:
      - Package.swift
      - Package.resolved
      - Sources/MarkdownUtilitiesCore/**
      - IntegrationTests/WasmCoreSmoke/**
      - scripts/build-wasm.sh
      - scripts/wasm-patches/**
      - .github/workflows/webassembly.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wasm-core:
    runs-on: ubuntu-latest
    container: swift:6.3.1-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install matching Swift WebAssembly SDK
        run: >-
          swift sdk install
          https://download.swift.org/swift-6.3.1-release/wasm-sdk/swift-6.3.1-RELEASE/swift-6.3.1-RELEASE_wasm.artifactbundle.tar.gz
          --checksum bd47baa20771f366d8beed7970afaa30742b2210097afd15f85427226d8f4cf2

      - name: Build and run WebAssembly Core smoke test
        run: scripts/build-wasm.sh
